name: cdc_pipeline
version: '1.0.0'
config-version: 2

profile: cdc_pipeline

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  cdc_pipeline:
    staging:
      +materialized: ephemeral
    gold:
      +materialized: incremental
      +incremental_strategy: append
